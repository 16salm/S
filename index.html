<!DOCTYPE HTML>
<html lang="ar">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <meta name="theme-color" content="#FFD700"/>
    <meta http-equiv="X-UA-Compatible" content="ie=edge"/>
    <title>SALEM | سـالـم</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Poppins:400,700&display=swap"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"/>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/typed.js/2.0.10/typed.min.js"></script>
    <style>
        :root {
            --back_color: radial-gradient(circle at center, #0a192f 0%, #020c1b 100%);
            --front_color: rgba(10, 25, 47, 0.75);
            --gold: #FFD700;
            --muted-gold: #c5a059;
            --deep-blue: #1A2980;
            --white: #e6f1ff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

        body {
            background: var(--back_color);
            width: 100vw; height: 100vh;
            overflow: hidden; display: flex;
            justify-content: center; align-items: center;
        }

        .vcard {
            width: 90%; max-width: 420px; height: 620px;
            background: var(--front_color);
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border-radius: 24px; border: 1px solid rgba(197, 160, 89, 0.2);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6);
            position: relative; overflow: hidden;
        }

        .header { height: 30%; position: relative; }
        .wave_bg { position: absolute; width: 100%; height: 100%; overflow: hidden; }
        .wave-01, .wave-02, .wave-03 {
            position: absolute; width: 550px; height: 550px;
            background: linear-gradient(45deg, var(--deep-blue), var(--muted-gold));
        }
        .wave-01 { border-radius: 43%; top: -180%; left: -15%; animation: rotate 14s linear infinite; }
        .wave-02 { border-radius: 40%; top: -185%; left: -20%; opacity: 0.3; animation: rotate 20s linear reverse infinite; }
        .wave-03 { border-radius: 45%; top: -175%; left: -10%; opacity: 0.15; animation: rotate 17s ease-in-out infinite; }
        @keyframes rotate { 100% { transform: rotate(360deg); } }

        .profile_pic_content {
            width: 120px; height: 120px; border-radius: 50%;
            position: absolute; left: 50%; transform: translate(-50%, -50%);
            top: 100%; overflow: hidden; z-index: 10;
            border: 3px solid var(--muted-gold); box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }

        .card_content { padding-top: 70px; text-align: center; }
        .satan h4 { font-size: 1.8em; letter-spacing: 2px; color: var(--gold); margin-bottom: 5px; }
        
        /* تنسيق زر اللايك الجديد */
        .like-section { margin: 15px 0; }
        #likeBtn { 
            font-size: 2rem; cursor: pointer; transition: 0.3s; color: rgba(255,255,255,0.2); 
        }
        #likeBtn.liked { color: #ff4b2b; transform: scale(1.2); filter: drop-shadow(0 0 8px #ff4b2b); }
        #likesCount { font-size: 0.9rem; color: var(--white); margin-top: 5px; }

        .social div { display: flex; justify-content: center; gap: 10px; margin-top: 15px; }
        .social i {
            padding: 10px; font-size: 1.2em; background: rgba(197, 160, 89, 0.05);
            border-radius: 12px; border: 1px solid rgba(197, 160, 89, 0.1); color: var(--muted-gold);
        }

        /* نافذة التسجيل */
        #loginPopup {
            display:none; position:fixed; top:0; left:0; width:100%; height:100%;
            background:rgba(0,0,0,0.85); justify-content:center; align-items:center; z-index: 1000;
        }
        .popup-box { background:#0a192f; padding:30px; border-radius:20px; width:320px; text-align:center; border: 1px solid var(--gold); }
        input { width:100%; padding:12px; margin:10px 0; border-radius:8px; border:1px solid #233554; background:#020c1b; color:white; outline:none; }
        .auth-btn { width:100%; padding:12px; background:var(--gold); border:none; border-radius:8px; cursor:pointer; font-weight:bold; margin-top:10px; }

        .footer-text { position: absolute; bottom: 15px; width: 100%; font-size: 0.7em; color: rgba(136, 146, 176, 0.4); text-align: center; }
    </style>
</head>
<body>

<div class="vcard">
    <div class="header">
        <div class="wave_bg"><div class="wave-01"></div><div class="wave-02"></div><div class="wave-03"></div></div>
        <div class="profile_pic_content">
            <video autoplay loop muted playsinline style="width:100%; height:100%; object-fit:cover;">
                <source src="https://files.catbox.moe/jvicv4.mp4" type="video/mp4">
            </video>
        </div>
    </div>

    <div class="card_content">
        <div class="satan"><h4>SALEM</h4></div>
        <div class="snuff"><h5 class="typed_text" style="min-height: 40px;"></h5></div>

        <div class="like-section">
            <i class="fas fa-heart" id="likeBtn" onclick="likePost(1)"></i>
            <div id="likesCount">0</div>
        </div>

        <div class="social">
            <div>
                <a href="https://t.me/kokksha"><i class="fab fa-telegram"></i></a>
                <a href="https://github.com/salemalshamrie"><i class="fab fa-github"></i></a>
                <a href="https://supabase.com/"><i class="fas fa-database"></i></a>
                <a href="javascript:void(0)" onclick="openPopup()"><i class="fas fa-sign-in-alt" title="Login"></i></a>
            </div>
        </div>
    </div>
    <p class="footer-text">© 2024-2026 Salem Al-Shammari | Karbala, Iraq</p>
</div>

<div id="loginPopup">
    <div class="popup-box">
        <h3 style="color:var(--gold); margin-bottom:15px;">انضم إلينا</h3>
        <input id="email" type="email" placeholder="البريد الإلكتروني">
        <input id="password" type="password" placeholder="كلمة المرور">
        <button class="auth-btn" onclick="signIn()">دخول</button>
        <button onclick="signUp()" style="background:transparent; color:white; border:1px solid var(--gold); padding:10px; width:100%; margin-top:10px; border-radius:8px; cursor:pointer;">إنشاء حساب</button>
        <p onclick="closePopup()" style="color:#aaa; cursor:pointer; font-size:12px; margin-top:15px;">إغلاق</p>
    </div>
</div>

<script>
    const supabaseClient = supabase.createClient("https://gzioimivawyqxjoxajdw.supabase.co", "sb_publishable_JcCYx54XAf9iw3p1PwXSUA_rUdBzDX-");
    let liked = false;

    function openPopup() { document.getElementById("loginPopup").style.display="flex"; }
    function closePopup() { document.getElementById("loginPopup").style.display="none"; }

    async function signIn() {
        const { error } = await supabaseClient.auth.signInWithPassword({
            email: document.getElementById("email").value,
            password: document.getElementById("password").value
        });
        if(error) alert(error.message); else { closePopup(); init(); }
    }

    async function signUp() {
        const { error } = await supabaseClient.auth.signUp({
            email: document.getElementById("email").value,
            password: document.getElementById("password").value
        });
        alert(error ? error.message : "تم الإرسال! تحقق من بريدك.");
    }

    async function likePost(postId) {
        const { data: { session } } = await supabaseClient.auth.getSession();
        if(!session) return openPopup();
        
        const user = session.user;
        if(liked) {
            await supabaseClient.from("likes").delete().eq("user_id", user.id).eq("post_id", postId);
            liked = false;
        } else {
            await supabaseClient.from("likes").insert({ user_id: user.id, post_id: postId });
            liked = true;
        }
        updateBtn();
    }

    async function getLikes(postId) {
        const { count } = await supabaseClient.from("likes").select('*', { count: 'exact', head: true }).eq("post_id", postId);
        document.getElementById("likesCount").innerText = count || 0;
    }

    function updateBtn() {
        document.getElementById("likeBtn").classList.toggle("liked", liked);
    }

    async function init() {
        const { data: { session } } = await supabaseClient.auth.getSession();
        if(session) {
            const { data } = await supabaseClient.from("likes").select("*").eq("user_id", session.user.id).eq("post_id", 1);
            liked = data && data.length > 0;
            updateBtn();
        }
        getLikes(1);
    }

    init();
    new Typed(".typed_text", {
        strings: ["Web Designer & Developer.", "Database Enthusiast.", "Creative Soul."],
        typeSpeed: 50, backSpeed: 30, loop: true
    });
</script>
</body>
</html>
