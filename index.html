<!DOCTYPE HTML>
<html lang="ar">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <meta name="theme-color" content="#FFD700"/>
    <meta http-equiv="X-UA-Compatible" content="ie=edge"/>
    <title>SALEM | سـالـم</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Poppins:400,700&display=swap"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"/>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/typed.js/2.0.10/typed.min.js"></script>
    <style>
        :root {
            --back_color: radial-gradient(circle at center, #0a192f 0%, #020c1b 100%);
            --front_color: rgba(10, 25, 47, 0.7);
            --gold: #FFD700;
            --muted-gold: #c5a059;
            --deep-blue: #1A2980;
            --white: #e6f1ff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: var(--back_color);
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .vcard {
            width: 90%;
            max-width: 420px;
            height: 580px; /* تم تقليل الطول قليلاً ليناسب حذف الزر */
            background: var(--front_color);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-radius: 24px;
            border: 1px solid rgba(197, 160, 89, 0.2);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6);
            position: relative;
            overflow: hidden;
        }

        .header {
            height: 35%;
            position: relative;
        }

        .wave_bg {
            position: absolute;
            width: 100%;
            height: 100%;
            overflow: hidden;
            pointer-events: none;
        }

        .wave-01, .wave-02, .wave-03 {
            position: absolute;
            width: 550px;
            height: 550px;
            background: linear-gradient(45deg, var(--deep-blue), var(--muted-gold));
        }

        .wave-01 { border-radius: 43%; top: -180%; left: -15%; animation: rotate 14s linear infinite; }
        .wave-02 { border-radius: 40%; top: -185%; left: -20%; opacity: 0.3; animation: rotate 20s linear reverse infinite; }
        .wave-03 { border-radius: 45%; top: -175%; left: -10%; opacity: 0.15; animation: rotate 17s ease-in-out infinite; }

        @keyframes rotate { 100% { transform: rotate(360deg); } }

        .profile_pic_content {
            width: 135px;
            height: 135px;
            border-radius: 50%;
            position: absolute;
            left: 50%;
            transform: translate(-50%, -50%);
            top: 100%;
            overflow: hidden;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.5);
            border: 3px solid var(--muted-gold);
            background-color: #000;
            z-index: 10;
        }

        .profile_video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .card_content {
            padding-top: 85px;
            text-align: center;
        }

        .satan h4 {
            font-size: 1.9em;
            letter-spacing: 3px;
            background: linear-gradient(to right, var(--gold), var(--white));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 12px;
            font-weight: 700;
        }

        .snuff {
            min-height: 100px;
            padding: 0 30px;
            color: #8892b0;
            font-size: 0.95em;
            line-height: 1.6;
        }

        .social {
            margin-top: 20px; /* مسافة متوازنة بعد النص */
        }

        .social div {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .social a {
            text-decoration: none;
        }

        .social i {
            padding: 12px;
            font-size: 1.3em;
            background: rgba(197, 160, 89, 0.05);
            border-radius: 14px;
            border: 1px solid rgba(197, 160, 89, 0.1);
            color: var(--muted-gold);
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .social a:hover i { 
            color: var(--gold) !important; 
            background: rgba(197, 160, 89, 0.15);
            transform: translateY(-5px);
            border-color: var(--gold);
            box-shadow: 0 5px 15px rgba(197, 160, 89, 0.2);
        }

        .footer-text {
            position: absolute;
            bottom: 20px;
            width: 100%;
            font-size: 0.75em;
            color: rgba(136, 146, 176, 0.4);
            text-align: center;
        }
    </style>
</head>
<body>

<div class="vcard">
    <div class="header">
        <div class="wave_bg">
            <div class="wave-01"></div>
            <div class="wave-02"></div>
            <div class="wave-03"></div>
        </div>
        <div class="profile_pic_content">
            <video class="profile_video" autoplay loop muted playsinline>
                <source src="https://files.catbox.moe/jvicv4.mp4" type="video/mp4">
            </video>
        </div>
    </div>

    <div class="card_content">
        <div class="satan">
            <h4>SALEM</h4>
        </div>
        
        <div class="snuff">
            <h5 class="typed_text"></h5>
        </div>

        <div class="social">
            <div>
                <a href="https://t.me/kokksha" title="Telegram"><i class="fab fa-telegram"></i></a>
                <a href="https://www.facebook.com/share/15KQ2NmX9V/" title="Facebook"><i class="fab fa-facebook"></i></a>
                <a href="https://www.instagram.com/_u_vf?igsh=bXRqd2Z4ZWhteW94" title="Instagram"><i class="fab fa-instagram"></i></a>
                <a href="https://github.com/salemalshamrie" title="GitHub"><i class="fab fa-github"></i></a>
                <a href="tg://settings" title="Profile Settings"><i class="fas fa-user"></i></a>
                <a href="https://g.co/kgs/pXVXQxK" title="Sports"><i class="fas fa-futbol"></i></a>
                <a href="https://uokerbala.edu.iq/" title="University"><i class="fas fa-university"></i></a>
            </div>
        </div>
    </div>

    <p class="footer-text">
        © 2024-2026 Salem Al-Shammari | Karbala, Iraq
    </p>
</div>

<script>
    var options = {
        strings: [
            "Web Designer & Creative Developer.", 
            "Turning code into visual art.", 
            "Proudly Based in <span style='color: #FFD700; font-weight: bold;'>Karbala, Iraq</span>."
        ],
        typeSpeed: 50,
        backSpeed: 30,
        backDelay: 2000,
        loop: true,
        cursorChar: '_',
    };
    var typed = new Typed(".typed_text", options);
</script>
</body>
</html>
