<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SALEM | Profile</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Poppins:400,700&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/typed.js/2.0.10/typed.min.js"></script>
    <style>
        body {
            background: linear-gradient(-45deg,#0a192f,#1A2980,#141e30,#243b55);
            background-size:400% 400%;
            animation:bg 10s ease infinite;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            font-family: 'Poppins', sans-serif;
            color:white;
            margin:0;
        }

        @keyframes bg { 0%{background-position:0%} 50%{background-position:100%} 100%{background-position:0%} }

        .vcard {
            width:90%;
            max-width:400px;
            background:rgba(10, 25, 47, 0.8);
            padding:30px;
            border-radius:25px;
            text-align:center;
            backdrop-filter:blur(15px);
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }

        #likeBtn {
            font-size:35px;
            cursor:pointer;
            transition: 0.3s;
            color: #555; /* اللون الافتراضي */
            margin-top: 15px;
        }

        #likeBtn.liked {
            color: #ff4b2b;
            transform: scale(1.2);
            filter: drop-shadow(0 0 8px #ff4b2b);
        }

        #likesCount { font-size: 1.1rem; margin-top: 5px; font-weight: bold; }

        #loginPopup {
            display:none; position:fixed; top:0; left:0; width:100%; height:100%;
            background:rgba(0,0,0,0.8); justify-content:center; align-items:center; z-index: 999;
        }

        .popup-box { background:#112240; padding:25px; border-radius:15px; width:280px; text-align:center; }
        input { width:90%; padding:10px; margin:8px 0; border-radius:8px; border:none; outline: none; }
        button { padding:10px 20px; border:none; border-radius:8px; background:#FFD700; cursor:pointer; font-weight: bold; }
        #msg { height: 20px; margin-top: 10px; color: #FFD700; font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="vcard">
    <h2>SALEM</h2>
    <h5 class="typed_text" style="color: #FFD700; height: 20px;"></h5>
    
    <div style="margin: 20px 0;">
        <i class="fas fa-heart" id="likeBtn" onclick="likePost(1)"></i>
        <div id="likesCount">0</div>
    </div>

    <p id="msg"></p>
</div>

<div id="loginPopup">
    <div class="popup-box">
        <h3 style="color:#FFD700;">تسجيل الدخول</h3>
        <input id="email" type="email" placeholder="Email">
        <input id="password" type="password" placeholder="Password">
        <br>
        <button onclick="signIn()">دخول</button>
        <button onclick="signUp()" style="background:transparent; color:white; border:1px solid #FFD700;">جديد؟</button>
        <p onclick="closePopup()" style="color:#aaa; cursor:pointer; font-size:12px; margin-top:15px;">إغلاق</p>
    </div>
</div>

<script>
    const supabaseClient = supabase.createClient(
        "https://gzioimivawyqxjoxajdw.supabase.co",
        "sb_publishable_JcCYx54XAf9iw3p1PwXSUA_rUdBzDX-"
    );

    let currentUser = null;
    let liked = false;

    // الدوال الأساسية
    function openPopup() { document.getElementById("loginPopup").style.display="flex"; }
    function closePopup() { document.getElementById("loginPopup").style.display="none"; }

    async function signIn() {
        const email = document.getElementById("email").value;
        const password = document.getElementById("password").value;
        const { error } = await supabaseClient.auth.signInWithPassword({email, password});
        if(error) alert("خطأ: " + error.message);
        else { closePopup(); init(); }
    }

    async function signUp() {
        const email = document.getElementById("email").value;
        const password = document.getElementById("password").value;
        const { error } = await supabaseClient.auth.signUp({email, password});
        alert(error ? error.message : "تأكد من بريدك الإلكتروني!");
    }

    async function likePost(postId) {
        const { data: { user } } = await supabaseClient.auth.getUser();
        if(!user) return openPopup();
        
        currentUser = user;
        if(liked) {
            await supabaseClient.from("likes").delete().eq("user_id", currentUser.id).eq("post_id", postId);
            liked = false;
            showMsg("تمت الإزالة 💔");
        } else {
            await supabaseClient.from("likes").insert({ user_id: currentUser.id, post_id: postId });
            liked = true;
            showMsg("أعجبني ❤️");
        }
        updateBtn();
    }

    function updateBtn() {
        const btn = document.getElementById("likeBtn");
        liked ? btn.classList.add("liked") : btn.classList.remove("liked");
    }

    async function getLikes(postId) {
        const { data } = await supabaseClient.from("likes").select("*").eq("post_id", postId);
        document.getElementById("likesCount").innerText = data ? data.length : 0;
    }

    async function checkIfLiked(postId) {
        const { data: { user } } = await supabaseClient.auth.getUser();
        if(!user) return;
        currentUser = user;
        const { data: likes } = await supabaseClient.from("likes").select("*").eq("user_id", currentUser.id).eq("post_id", postId);
        liked = likes && likes.length > 0;
        updateBtn();
    }

    function showMsg(text) {
        const msg = document.getElementById("msg");
        msg.innerText = text;
        setTimeout(() => msg.innerText = "", 1500);
    }

    async function init() {
        await checkIfLiked(1);
        getLikes(1);
        // تفعيل التحديث اللحظي
        supabaseClient.channel('custom-all-channel')
        .on('postgres_changes', { event: '*', schema: 'public', table: 'likes' }, () => getLikes(1))
        .subscribe();
    }

    init();

    new Typed(".typed_text", {
        strings: ["Web Developer", "UI/UX Designer", "مرحباً بك في ملفي"],
        typeSpeed: 60,
        backSpeed: 40,
        loop: true
    });
</script>
</body>
</html>
