<!DOCTYPE HTML>
<html lang="ar">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <meta name="theme-color" content="#FFD700"/>
    <meta http-equiv="X-UA-Compatible" content="ie=edge"/>
    <title>SALEM | سـالـم</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Poppins:400,700&display=swap"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"/>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/typed.js/2.0.10/typed.min.js"></script>
    <style>
        :root {
            --back_color: radial-gradient(circle at center, #0a192f 0%, #020c1b 100%);
            --front_color: rgba(10, 25, 47, 0.7);
            --gold: #FFD700;
            --muted-gold: #c5a059;
            --white: #e6f1ff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

        body {
            background: var(--back_color);
            width: 100vw; height: 100vh;
            overflow: hidden;
            display: flex; justify-content: center; align-items: center;
        }

        .vcard {
            width: 90%; max-width: 420px; height: 600px;
            background: var(--front_color);
            backdrop-filter: blur(25px);
            border-radius: 24px;
            border: 1px solid rgba(197, 160, 89, 0.2);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6);
            position: relative; overflow: hidden;
        }

        .header { height: 30%; position: relative; }

        .wave_bg { position: absolute; width: 100%; height: 100%; overflow: hidden; pointer-events: none; }
        .wave-01, .wave-02, .wave-03 {
            position: absolute; width: 550px; height: 550px;
            background: linear-gradient(45deg, #1A2980, var(--muted-gold));
        }
        .wave-01 { border-radius: 43%; top: -180%; left: -15%; animation: rotate 14s linear infinite; }
        .wave-02 { border-radius: 40%; top: -185%; left: -20%; opacity: 0.3; animation: rotate 20s linear reverse infinite; }
        .wave-03 { border-radius: 45%; top: -175%; left: -10%; opacity: 0.15; animation: rotate 17s ease-in-out infinite; }
        @keyframes rotate { 100% { transform: rotate(360deg); } }

        .profile_pic_content {
            width: 125px; height: 125px; border-radius: 50%;
            position: absolute; left: 50%; transform: translate(-50%, -50%);
            top: 100%; overflow: hidden;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.5);
            border: 3px solid var(--muted-gold);
            background-color: #000; z-index: 10;
        }

        .profile_video { width: 100%; height: 100%; object-fit: cover; }

        .card_content { padding-top: 75px; text-align: center; }

        .satan h4 {
            font-size: 1.8em; letter-spacing: 3px;
            background: linear-gradient(to right, var(--gold), var(--white));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 5px; font-weight: 700;
        }

        .snuff { min-height: 40px; color: #8892b0; font-size: 0.85em; }

        .stats_container { display: flex; justify-content: center; gap: 40px; margin: 15px 0; }
        .stat_item { display: flex; flex-direction: column; }
        .stat_value { color: var(--gold); font-weight: 700; font-size: 1.2em; transition: 0.3s; }
        .stat_label { color: #8892b0; font-size: 0.7em; text-transform: uppercase; letter-spacing: 1px; }

        /* نبضة خفيفة للرقم عند التغير */
        .pop { transform: scale(1.2); color: #fff; }

        .follow-btn {
            display: inline-block; padding: 8px 35px; margin-bottom: 15px;
            background: rgba(197, 160, 89, 0.1);
            border: 1px solid var(--muted-gold);
            border-radius: 50px; color: var(--gold);
            text-decoration: none; font-size: 0.9em; font-weight: 600;
            transition: 0.3s; cursor: pointer;
        }

        .follow-btn.active { background: var(--gold); color: #020c1b; border-color: var(--gold); }

        .social div { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; margin-top: 10px;}
        .social i {
            padding: 10px; font-size: 1.2em;
            background: rgba(197, 160, 89, 0.05);
            border-radius: 12px; border: 1px solid rgba(197, 160, 89, 0.1);
            color: var(--muted-gold); transition: 0.3s;
        }
        .social a:hover i { transform: translateY(-3px); color: var(--gold); }

        .footer-text { position: absolute; bottom: 15px; width: 100%; font-size: 0.7em; color: rgba(136, 146, 176, 0.3); text-align: center; }
    </style>
</head>
<body>

<div class="vcard">
    <div class="header">
        <div class="wave_bg"><div class="wave-01"></div><div class="wave-02"></div><div class="wave-03"></div></div>
        <div class="profile_pic_content">
            <video class="profile_video" autoplay loop muted playsinline poster="iou.jpg">
                <source src="https://files.catbox.moe/jvicv4.mp4" type="video/mp4">
            </video>
        </div>
    </div>

    <div class="card_content">
        <div class="satan"><h4>SALEM</h4></div>
        <div class="snuff"><h5 class="typed_text"></h5></div>

        <div class="stats_container">
            <div class="stat_item">
                <span class="stat_value" id="followerCount">2000</span>
                <span class="stat_label">Followers</span>
            </div>
            <div class="stat_item">
                <span class="stat_value">35</span>
                <span class="stat_label">Following</span>
            </div>
        </div>

        <div id="followBtn" class="follow-btn">Follow | متابعة</div>

        <div class="social">
            <div>
                <a href="https://t.me/kokksha"><i class="fab fa-telegram"></i></a>
                <a href="https://www.facebook.com/share/15KQ2NmX9V/"><i class="fab fa-facebook"></i></a>
                <a href="https://www.instagram.com/_u_vf?igsh=bXRqd2Z4ZWhteW94"><i class="fab fa-instagram"></i></a>
                <a href="https://github.com/salemalshamrie"><i class="fab fa-github"></i></a>
                <a href="tg://settings"><i class="fas fa-user"></i></a>
                <a href="https://g.co/kgs/pXVXQxK"><i class="fas fa-futbol"></i></a>
                <a href="https://uokerbala.edu.iq/"><i class="fas fa-university"></i></a>
            </div>
        </div>
    </div>

    <p class="footer-text">© 2024-2026 Salem Al-Shammari | Karbala, Iraq</p>
</div>

<script>
    // منطق زيادة المتابعين
    const btn = document.getElementById('followBtn');
    const countDisplay = document.getElementById('followerCount');
    let following = false;
    let baseCount = 2000;

    btn.addEventListener('click', () => {
        if(!following) {
            baseCount++;
            btn.innerText = "Following | تم";
            btn.classList.add('active');
            following = true;
        } else {
            baseCount--;
            btn.innerText = "Follow | متابعة";
            btn.classList.remove('active');
            following = false;
        }
        countDisplay.innerText = baseCount;
        countDisplay.classList.add('pop');
        setTimeout(() => countDisplay.classList.remove('pop'), 300);
    });

    // الكتابة التلقائية
    new Typed(".typed_text", {
        strings: ["Web Designer & Creative Developer.", "Creative Digital Solutions."],
        typeSpeed: 50, backSpeed: 30, loop: true
    });
</script>
</body>
</html>
