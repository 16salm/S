<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SALEM | Profile</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Poppins:400,700&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/typed.js/2.0.10/typed.min.js"></script>
    <style>
        body {
            background: linear-gradient(-45deg,#0a192f,#1A2980,#141e30,#243b55);
            background-size:400% 400%;
            animation:bg 15s ease infinite;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            font-family: 'Poppins', sans-serif;
            color:white;
            margin:0;
            overflow: hidden;
        }

        @keyframes bg { 0%{background-position:0%} 50%{background-position:100%} 100%{background-position:0%} }

        .vcard {
            width:90%;
            max-width:380px;
            background:rgba(10, 25, 47, 0.85);
            padding:50px 30px;
            border-radius:30px;
            text-align:center;
            backdrop-filter:blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
        }

        .typed_text {
            color: #FFD700;
            font-weight: bold;
            font-size: 1.1rem;
        }

        h2 {
            letter-spacing: 2px;
            margin-bottom: 15px;
            font-size: 2rem;
        }
    </style>
</head>
<body>

<div class="vcard">
    <h2>SALEM</h2>
    <div style="height: 30px;">
        <span class="typed_text"></span>
    </div>
</div>

<script>
    // تفعيل تأثير الكتابة التلقائية
    new Typed(".typed_text", {
        strings: ["Web Developer", "UI/UX Designer", "Creative Developer"],
        typeSpeed: 60,
        backSpeed: 40,
        loop: true,
        showCursor: true,
        cursorChar: '|'
    });
</script>

</body>
</html>
