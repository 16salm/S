<script>
const supabaseClient = supabase.createClient(
"https://gzioimivawyqxjoxajdw.supabase.co",
"sb_publishable_JcCYx54XAf9iw3p1PwXSUA_rUdBzDX-"
)

let currentUser=null
let liked=false

function openPopup(){
document.getElementById("loginPopup").style.display="flex"
}

function closePopup(){
document.getElementById("loginPopup").style.display="none"
}

async function signIn(){
const email=document.getElementById("email").value
const password=document.getElementById("password").value

await supabaseClient.auth.signInWithPassword({email,password})
closePopup()
init()
}

async function signUp(){
const email=document.getElementById("email").value
const password=document.getElementById("password").value

await supabaseClient.auth.signUp({email,password})
}

async function likePost(postId){
if(!currentUser){
openPopup()
return
}

if(liked){
await supabaseClient.from("likes").delete()
.eq("user_id",currentUser.id)
.eq("post_id",postId)
liked=false
showMsg("💔 تم إزالة اللايك")
}else{
await supabaseClient.from("likes").insert({
user_id:currentUser.id,
post_id:postId
})
liked=true
showMsg("❤️ لايك")
}
updateBtn()
}

function updateBtn(){
const btn=document.getElementById("likeBtn")
liked ? btn.classList.add("liked") : btn.classList.remove("liked")
}

async function getLikes(postId){
const {data}=await supabaseClient.from("likes")
.select("*").eq("post_id",postId)
document.getElementById("likesCount").innerText=data.length
}

async function checkIfLiked(postId){
const {data}=await supabaseClient.auth.getUser()
currentUser=data.user
if(!currentUser)return

const {data:likes}=await supabaseClient.from("likes")
.select("*")
.eq("user_id",currentUser.id)
.eq("post_id",postId)

liked=likes.length>0
updateBtn()
}

function subscribeToLikes(postId){
supabaseClient.channel("likes")
.on("postgres_changes",{
event:"*",
schema:"public",
table:"likes",
filter:`post_id=eq.${postId}`
},()=>getLikes(postId))
.subscribe()
}

function showMsg(text){
const msg=document.getElementById("msg")
msg.innerText=text
setTimeout(()=>msg.innerText="",1500)
}

async function init(){
await checkIfLiked(1)
getLikes(1)
subscribeToLikes(1)
}

init()

// كتابة متحركة
new Typed(".typed_text", {
strings:["Web Developer","Creative Designer","🔥 Welcome"],
typeSpeed:50,
backSpeed:30,
loop:true
})
</script>
