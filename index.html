<!DOCTYPE HTML>
<html lang="ar">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <meta name="theme-color" content="#6C63FF"/>
    <meta http-equiv="X-UA-Compatible" content="ie=edge"/>
    <meta name="description" content="@kokksha"/>
    <title>SALEM</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Poppins"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"/>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/typed.js/2.0.10/typed.min.js"></script>
    <style>
        :root {
            --back_color: linear-gradient(to bottom, #040826, #1a1a40, #36295a, #543974, #73498e);
            --front_color: linear-gradient(to bottom, #100f1c, #27203d, #3f2f5e, #573f7f, #6f4fa0);
            --purple: #6C63FF;
            --pink: #FF6B6B;
        }

        * {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--back_color);
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .vcard {
            width: 90%;
            max-width: 450px;
            height: 550px;
            background: var(--front_color);
            border-radius: 8px;
            box-shadow: 5px 0px 20px rgba(0, 0, 0, 0.39);
            margin-top: -50px;
        }

        .header {
            height: 40%;
            position: relative;
        }

        .wave_bg {
            border-radius: 8px;
            position: relative;
            height: 100%;
            overflow: hidden;
        }

        .wave-01, .wave-02, .wave-03 {
            position: absolute;
            width: 600px;
            height: 600px;
            background: linear-gradient(to top right, var(--purple), var(--pink));
        }

        .wave-01 { border-radius: 50%; top: -200%; left: -20%; animation: rotate 10s linear infinite; }
        .wave-02 { border-radius: 40%; top: -205%; left: -22%; opacity: 0.5; animation: rotate 15s linear infinite; }
        .wave-03 { border-radius: 45%; top: -198%; left: -18%; opacity: 0.2; animation: rotate 15s linear infinite; }

        @keyframes rotate { 100% { transform: rotate(360deg); } }

        .profile_pic_content {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            position: absolute;
            left: 50%;
            transform: translate(-50%, -50%);
            top: 80%;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
            border: 3px solid rgba(255, 255, 255, 0.2);
            background-color: #000;
        }

        .profile_video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .card_content {
            position: relative;
            top: 7%;
            text-align: center;
        }

        .satan {
            font-weight: 700;
            font-size: 1.4em;
            background: linear-gradient(to right, var(--pink), var(--purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .snuff {
            margin-top: 5px;
            padding: 0 10px;
            color: white;
        }

        .typed_text { text-align: center; }

        .social {
            padding: 5px;
            margin: 65px auto 0;
            width: fit-content;
        }

        .social div { display: flex; justify-content: center; align-items: center; }

        .social a { text-decoration: none; margin: 0 5px; }

        .social i {
            padding: 10px;
            font-size: 1.2em;
            transition: transform 0.3s ease;
        }

        .social i:hover { transform: scale(1.2); color: white !important; }

        .satanic {
            cursor: pointer;
            display: block;
            text-decoration: none;
            width: 60%;
            margin: 15px auto 0;
            background: linear-gradient(to top right, var(--pink), var(--purple));
            padding: 12px 20px;
            border-radius: 30px;
            color: white;
            font-weight: bolder;
            transition: 0.3s;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
        }

        .satanic:hover {
            box-shadow: 0 8px 20px rgba(108, 99, 255, 0.4);
            transform: translateY(-2px);
        }

        .cursor {
            display: inline-block;
            width: 2px;
            background-color: #fff;
            margin-left: 5px;
            animation: blink 0.5s infinite;
        }

        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body>
<div class="vcard">
    <div class="header">
        <div class="wave_bg">
            <div class="wave-01"></div>
            <div class="wave-02"></div>
            <div class="wave-03"></div>
        </div>
        <div class="profile_pic_content">
            <video class="profile_video" autoplay loop muted playsinline poster="IMG_4738.jpeg">
                <source src="IMG_4738.mp4" type="video/mp4">
                <source src="IMG_4738.mov" type="video/quicktime">
                متصفحك لا يدعم تشغيل الفيديو.
            </video>
        </div>
    </div>
    <div class="card_content">
        <div class="satan">
            <h4>SALEM</h4>
        </div>
        <div class="snuff">
            <h5 class="typed_text"><i>Hello World</i><span class="cursor">|</span></h5>
        </div>
        <div class="social">
            <div>
                <a href="https://t.me/kokksha"><i class="fab fa-telegram" style="color: #2AABEE;"></i></a>
                <a href="#"><i class="fab fa-instagram" style="color: #E1306C;"></i></a>
                <a href="#"><i class="fab fa-facebook" style="color: #1877F2;"></i></a>
                <a href="https://github.com/salemalshamrie"><i class="fab fa-github" style="color: #ffffff;"></i></a>
                <a href="#"><i class="fas fa-futbol" style="color: #DB4437;"></i></a>
            </div>
        </div>
        <a class="satanic" href="https://t.me/kokksha"><i class="fab fa-telegram"></i> Join Channel</a>
        <p style="font-size: 0.65em; margin-top: 20px; color: rgba(255,255,255,0.5);">
            © 2024-2026 Salem Al-Shammari
        </p>
    </div>
</div>
<script>
    var options = {
        strings: ["Web Designer", "Believe in yourself.", "Telegram: @kokksha"],
        typeSpeed: 50,
        backSpeed: 30,
        loop: true
    };
    var typed = new Typed(".typed_text", options);
</script>
</body>
</html>
