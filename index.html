<!DOCTYPE HTML>
<html lang="ar">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <meta name="theme-color" content="#0984e3"/>
    <meta http-equiv="X-UA-Compatible" content="ie=edge"/>
    <title>SALEM | سـالـم</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Poppins:400,900&display=swap"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"/>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/typed.js/2.0.10/typed.min.js"></script>
    <style>
        :root {
            /* لوحة ألوان الأنمي: سماء صافية وزهور الساكورا */
            --back_color: linear-gradient(180deg, #74b9ff 0%, #a29bfe 100%);
            --front_color: rgba(255, 255, 255, 0.9);
            --anime-blue: #0984e3;
            --anime-pink: #fd79a8;
            --anime-border: #2d3436; /* تحديد المانجا الغامق */
            --white: #ffffff;
            --text-color: #2d3436;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: var(--back_color);
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .vcard {
            width: 90%;
            max-width: 400px;
            height: 580px;
            background: var(--front_color);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 30px;
            /* تحديد صلب يشبه الرسم */
            border: 4px solid var(--anime-border);
            /* ظل صلب Offset Shadow */
            box-shadow: 12px 12px 0px rgba(0, 0, 0, 0.15);
            position: relative;
            overflow: hidden;
        }

        .header {
            height: 35%;
            position: relative;
            background: #fff;
        }

        .wave_bg {
            position: absolute;
            width: 100%;
            height: 100%;
            overflow: hidden;
            pointer-events: none;
        }

        .wave-01, .wave-02, .wave-03 {
            position: absolute;
            width: 600px;
            height: 600px;
        }

        /* أمواج بألوان باستيل حيوية */
        .wave-01 { border-radius: 43%; top: -180%; left: -15%; background: var(--anime-blue); opacity: 0.7; animation: rotate 14s linear infinite; }
        .wave-02 { border-radius: 40%; top: -185%; left: -20%; background: var(--anime-pink); opacity: 0.5; animation: rotate 20s linear reverse infinite; }
        .wave-03 { border-radius: 45%; top: -175%; left: -10%; background: #ffeaa7; opacity: 0.4; animation: rotate 17s ease-in-out infinite; }

        @keyframes rotate { 100% { transform: rotate(360deg); } }

        .profile_pic_content {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            position: absolute;
            left: 50%;
            transform: translate(-50%, -50%);
            top: 100%;
            overflow: hidden;
            background-color: #fff;
            z-index: 10;
            /* تحديد الصورة لتبدو كإطار كرتوني */
            border: 4px solid var(--anime-border);
            box-shadow: 5px 5px 0px rgba(0, 0, 0, 0.1);
        }

        .profile_video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .card_content {
            padding-top: 80px;
            text-align: center;
        }

        .satan h4 {
            font-size: 2.2em;
            letter-spacing: 2px;
            /* تدرج لوني قوي */
            background: linear-gradient(to bottom, var(--anime-blue), #6c5ce7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
            font-weight: 900;
            filter: drop-shadow(2px 2px 0px rgba(0,0,0,0.1));
        }

        .snuff {
            min-height: 80px;
            padding: 0 30px;
            color: var(--text-color);
            font-size: 1em;
            font-weight: 500;
            line-height: 1.5;
        }

        .social {
            margin-top: 25px;
        }

        .social div {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .social i {
            padding: 12px;
            font-size: 1.4em;
            background: var(--white);
            border-radius: 12px;
            /* أزرار محددة بوضوح */
            border: 3px solid var(--anime-border);
            color: var(--anime-blue);
            transition: 0.2s ease-in-out;
            box-shadow: 4px 4px 0px var(--anime-border);
        }

        .social a:hover i { 
            background: var(--anime-pink) !important;
            color: #fff !important;
            transform: translate(-3px, -3px);
            box-shadow: 7px 7px 0px var(--anime-border);
        }

        .footer-text {
            position: absolute;
            bottom: 15px;
            width: 100%;
            font-size: 0.8em;
            font-weight: bold;
            color: var(--anime-blue);
            opacity: 0.6;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="vcard">
    <div class="header">
        <div class="wave_bg">
            <div class="wave-01"></div>
            <div class="wave-02"></div>
            <div class="wave-03"></div>
        </div>
        <div class="profile_pic_content">
            <video class="profile_video" autoplay loop muted playsinline poster="iou.jpg">
                <source src="https://files.catbox.moe/jvicv4.mp4" type="video/mp4">
            </video>
        </div>
    </div>

    <div class="card_content">
        <div class="satan">
            <h4>SALEM</h4>
        </div>
        
        <div class="snuff">
            <h5 class="typed_text"></h5>
        </div>

        <div class="social">
            <div>
                <a href="https://t.me/kokksha"><i class="fab fa-telegram"></i></a>
                <a href="https://www.facebook.com/share/15KQ2NmX9V/"><i class="fab fa-facebook"></i></a>
                <a href="https://www.instagram.com/_u_vf?igsh=bXRqd2Z4ZWhteW94"><i class="fab fa-instagram"></i></a>
                <a href="https://github.com/salemalshamrie"><i class="fab fa-github"></i></a>
                <a href="tg://settings"><i class="fas fa-user"></i></a>
                <a href="https://g.co/kgs/pXVXQxK"><i class="fas fa-futbol"></i></a>
                <a href="https://uokerbala.edu.iq/"><i class="fas fa-university"></i></a>
            </div>
        </div>
    </div>

    <p class="footer-text">
        © 2024-2026 SALEM | MADE WITH ART
    </p>
</div>

<script>
    var options = {
        strings: [
            "Anime-Style Developer.", 
            "Creating Visual Magic ✨", 
            "<span style='color: #fd79a8; font-weight: 900;'>STAY CREATIVE</span>"
        ],
        typeSpeed: 60,
        backSpeed: 40,
        backDelay: 1500,
        loop: true,
        cursorChar: '|',
    };
    var typed = new Typed(".typed_text", options);
</script>
</body>
</html>
